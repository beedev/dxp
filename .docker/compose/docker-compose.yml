services:
  # ---------------------------------------------------------------------------
  # Keycloak 26 — Identity & Access Management
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: dxp-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://host.docker.internal:5432/${POSTGRES_DB:-dxp}
      KC_DB_USERNAME: ${POSTGRES_USER:-dxp}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-dxp_local_pass}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: true
    ports:
      - "8080:8080"
    volumes:
      - ../../infra/keycloak:/opt/keycloak/data/import
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - dxp-net

  # ---------------------------------------------------------------------------
  # Kong 3.9 — API Gateway (declarative, DB-less)
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.9
    container_name: dxp-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ../../infra/kong/kong.yml:/etc/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dxp-net

  # ---------------------------------------------------------------------------
  # HAPI FHIR 7 — Healthcare Interoperability Platform (R4)
  # ---------------------------------------------------------------------------
  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: dxp-hapi-fhir
    environment:
      # PostgreSQL 17 connection
      spring.datasource.url: jdbc:postgresql://host.docker.internal:5432/hapi_fhir
      spring.datasource.username: ${POSTGRES_USER:-bharath}
      spring.datasource.password: ${POSTGRES_PASSWORD:-}
      spring.datasource.driverClassName: org.postgresql.Driver
      spring.jpa.properties.hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      spring.jpa.properties.hibernate.search.enabled: "false"
      # HAPI FHIR config
      hapi.fhir.fhir_version: R4
      hapi.fhir.cors.allow_Credentials: "true"
      hapi.fhir.cors.allowed_origin: "*"
      hapi.fhir.allow_external_references: "true"
      hapi.fhir.allow_cascading_deletes: "true"
      server.port: "8090"
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/fhir/metadata"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      - dxp-net

  # stripe-mock — official Stripe API mock for local Checkout/PaymentIntent
  # development. Used by the Stripe UCP adapter when UCP_ADAPTER=stripe.
  # Switch to real Stripe by removing STRIPE_API_HOST from .env.
  stripe-mock:
    image: stripe/stripe-mock:latest
    container_name: dxp-stripe-mock
    ports:
      - "12111:12111"
      - "12112:12112"
    networks:
      - dxp-net

networks:
  dxp-net:
    driver: bridge
